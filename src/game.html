<!DOCTYPE html>

<style>
  *,
  body {
    margin: 0;
    padding: 0;
  }

  canvas {
    background: transparent;
  }
</style>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<!-- SDK do Socket.IO servido automaticamente pelo Node.js -->
<script src="/socket.io/socket.io.js"></script>
<!-- lib de gifs no canvas-->
<script src="https://cdn.jsdelivr.net/npm/gifler@0.1.0/gifler.min.js"></script>
<script>
  const socket = io();
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // ==========================================
  // CONFIGURAÇÕES DE ESCALA VISUAL
  // ==========================================
  const PLAYER_RENDER_SCALE = 2.9;     // Aumentou o Player (Era 1.5)
  const ITEM_RENDER_SCALE = 5.4;       // <--- NOVO: Aumenta as árvores/itens
  const FLOOR_TILE_SCALE = 1.5;        // <--- NOVO: Aumenta a textura do chão/plataforma
  
  const walkGifCanvas = document.createElement('canvas');
  let isWalkGifLoaded = false;

  const spriteImages = {
    idle: new Image(),
    walk: new Image(),
    jump: new Image(),
    enemy: new Image(),
    tree: new Image(),
    floor: new Image(),
  };

  const backgroundCache = {};

  spriteImages.idle.src = '/sprites/idle.png';
  spriteImages.walk.src = '/sprites/walk.gif';
  spriteImages.jump.src = '/sprites/jump.png';
  spriteImages.enemy.src = '/sprites/enemy.png';
  spriteImages.tree.src = '/sprites/scenary/tree.png';
  spriteImages.floor.src = '/sprites/scenary/floor1.png';

  let myId = null;
  let players = {};
  let enemies = [];
  let backgroundItems = [];
  let platforms = [];
  let worldWidth = 800;
  let cameraX = 0;
  let currentLevel = 1;
  let backgroundLevel;
  let floorBackground;
  let debug = false;
  const imageCache = {};

  // Posição do mouse
  const mouse = { x: 0, y: 0 };

  const CANVAS_WIDTH = 800;
  const CANVAS_HEIGHT = 600;

  // --- GERENCIAMENTO DE INPUTS (TECLADO) ---
  const keys = {
    left: false,
    right: false,
    up: false,
  };

  function onDrawWalkFrame(ctx, frame) {
    // Ajusta o tamanho do canvas para a dimensão do frame atual
    ctx.canvas.width = frame.width;
    ctx.canvas.height = frame.height;

    // Limpa e desenha o frame buffer do GIF
    ctx.globalCompositeOperation = 'source-over';
    ctx.drawImage(frame.buffer, frame.x, frame.y, frame.width, frame.height);

    isWalkGifLoaded = true;
  }

  // Passamos o nosso canvas em memória diretamente no gifler
  gifler('/sprites/walk.gif').frames(walkGifCanvas, onDrawWalkFrame);

  function sendInputs() {
    socket.emit('playerInput', keys);
  }

  window.addEventListener('keydown', (e) => {
    let changed = false;
    if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') {
      if (!keys.left) {
        keys.left = true;
        changed = true;
      }
    }
    if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') {
      if (!keys.right) {
        keys.right = true;
        changed = true;
      }
    }
    if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp' || e.key === ' ') {
      if (!keys.up) {
        keys.up = true;
        changed = true;
      }
    }
    if (e.key === 'l' || e.key === 'L') {
      currentLevel = currentLevel === 1 ? 2 : 1;
      socket.emit('changeLevel', currentLevel);
    }

    if (changed) sendInputs();
  });

  window.addEventListener('keyup', (e) => {
    let changed = false;
    if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') {
      keys.left = false;
      changed = true;
    }
    if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') {
      keys.right = false;
      changed = true;
    }
    if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp' || e.key === ' ') {
      keys.up = false;
      changed = true;
    }

    if (changed) sendInputs();
  });

  // --- RASTREAMENTO DO MOUSE ---
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    // Posição do mouse relativa ao Canvas (Tela)
    mouse.x = Math.round(e.clientX - rect.left);
    mouse.y = Math.round(e.clientY - rect.top);
  });

  // --- EVENTOS SOCKET.IO ---

  socket.on('init', (data) => {
    myId = data.id;
    platforms = data.platforms;
    worldWidth = data.worldWidth;
    currentLevel = data.level || currentLevel;
    backgroundItems = data.backgroundItems || [];
    enemies = data.enemies || [];
    backgroundLevel = data.backgroundLevel || backgroundLevel;
    floorBackground = data.floorBackground || floorBackground;
    debug: data.debug || false
  });

  socket.on('state', (serverState) => {
    players = serverState.players || serverState;
    enemies = serverState.enemies || [];
    render();
  });

  socket.on('levelChanged', (data) => {
    platforms = data.platforms;
    worldWidth = data.worldWidth;
    currentLevel = data.level || currentLevel;
    backgroundItems = data.backgroundItems || [];
    enemies = data.enemies || [];
    backgroundLevel = data.backgroundLevel || backgroundLevel;
    floorBackground = data.floorBackground || floorBackground;
    render();
  });

  function getPlayerSprite(player) {
    if (!player.grounded && player.vy < 0) {
      return spriteImages.jump;
    }

    if (Math.abs(player.vx) > 0.5) {
      return 'walk';
    }

    return spriteImages.idle;
  }

  function drawPlayerSprite(player) {
    const sprite = getPlayerSprite(player);

    // Se estiver andando mas o GIF ainda não carregou, usa fallback de cor
    if (sprite === 'walk' && !isWalkGifLoaded) {
      ctx.fillStyle = player.color;
      ctx.fillRect(player.x, player.y - 14, player.width, player.height);
      return;
    }

    // Se for Idle/Jump e a imagem não carregou
    if (sprite !== 'walk' && (!sprite || !sprite.complete)) {
      ctx.fillStyle = player.color;
      ctx.fillRect(player.x, player.y - 14, player.width, player.height);
      return;
    }

    const facing = player.facing || (player.vx < 0 ? 'left' : 'right');
    const drawWidth = player.width * PLAYER_RENDER_SCALE;
    const drawHeight = player.height * PLAYER_RENDER_SCALE;
    const outfitHue = player.outfitHue || 0;

    ctx.save();
    ctx.filter = `hue-rotate(${outfitHue}deg) saturate(1.15) brightness(1.03)`;

    ctx.translate(
      player.x + player.width / 2,
      player.y - 14 + player.height + 20
    );

    if (facing === 'left') {
      ctx.scale(-1, 1);
    }

    // Se for 'walk', usa nosso walkGifCanvas; caso contrário, a imagem normal
    const imageToDraw = sprite === 'walk' ? walkGifCanvas : sprite;

    ctx.drawImage(imageToDraw, -drawWidth / 2, -drawHeight, drawWidth, drawHeight);
    ctx.restore();
  }

  function drawEnemySprite(enemy) {
    const enemyBackground = enemy.background;
    const enemyImage = getBackgroundImage(enemyBackground);

    if (enemyImage.complete) {
      const drawWidth = enemy.width * 1.25;
      const drawHeight = enemy.height * 1.25;

      ctx.save();
      ctx.translate(enemy.x + enemy.width / 2, enemy.y - (drawHeight - enemy.height) / 2);

      if (enemy.direction < 0) {
        ctx.scale(-1, 1);
      }

      ctx.drawImage(enemyImage, -drawWidth / 2, 0, drawWidth, drawHeight);
      ctx.restore();
      return;
    }

    ctx.fillStyle = enemy.color;
    ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
  }

  function drawBackgroundItem(item) {
    const itemBackground = item.background || '/sprites/scenary/tree.png';
    const itemImage = getBackgroundImage(itemBackground);

    if (item.type === 'tree' && itemImage.complete) {
      ctx.drawImage(itemImage, item.x, item.y, item.w, item.h);
    }
  }

  function drawPlatformSprite(plat) {
    const textureSource = floorBackground || '/sprites/scenary/floor2.png'; //[cite: 1]
    const textureImage = getBackgroundImage(textureSource); //[cite: 1]

    if (textureImage && textureImage.complete && textureImage.naturalWidth > 0) { //[cite: 1]
      ctx.save(); //[cite: 1]

      // Recorta a área da plataforma
      ctx.beginPath(); //[cite: 1]
      ctx.rect(plat.x, plat.y, plat.w, plat.h); //[cite: 1]
      ctx.clip(); //[cite: 1]

      // Redimensiona o tile para a altura exata da plataforma (plat.h)
      const scale = plat.h / textureImage.naturalHeight; //[cite: 1]
      const tileW = textureImage.naturalWidth * scale; // Largura proporcional[cite: 1]
      const tileH = plat.h; // Altura ajustada[cite: 1]

      // Repete a imagem ajustada ao longo da plataforma
      for (let x = plat.x; x < plat.x + plat.w; x += tileW) { //[cite: 1]
        ctx.drawImage(textureImage, x, plat.y, tileW, tileH); //[cite: 1]
      }

      ctx.restore(); //[cite: 1]
    } else {
      // Fallback enquanto carrega
      ctx.fillStyle = plat.color || '#e94560'; //[cite: 1]
      ctx.fillRect(plat.x, plat.y, plat.w, plat.h); //[cite: 1]
    }

    // --- BORDA VERMELHA ---
    if(plat.debug || debug) {
      ctx.save();
      ctx.strokeStyle = 'red';
      ctx.lineWidth = 2;
      ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
      ctx.restore();
    }
  }

  function getBackgroundImage(src) {
    if (!src) return null;
    if (!imageCache[src]) {
      const img = new Image();
      img.src = src;
      imageCache[src] = img;
    }
    return imageCache[src];
  }

  function drawFixedBackground() {
    const baseBackground = backgroundLevel || '#1d3557';

    if (typeof baseBackground === 'string' && baseBackground.startsWith('/')) {
      const backgroundImage = getBackgroundImage(baseBackground);

      if (backgroundImage.complete) {
        ctx.drawImage(backgroundImage, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        return;
      }
    }

    ctx.fillStyle = baseBackground;
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
  }

  // --- RENDERIZAÇÃO E CÂMERA ---
  function render() {
    // 1. Limpa a tela
    ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

    // 2. Desenha o fundo fixo na tela
    drawFixedBackground();

    // 3. Calcula a posição da Câmera
    const myPlayer = players[myId];
    if (myPlayer) {
      cameraX = myPlayer.x - CANVAS_WIDTH / 2 + myPlayer.width / 2;
      cameraX = Math.max(0, Math.min(cameraX, worldWidth - CANVAS_WIDTH));
    }

    // 4. Salva o estado original do Canvas
    ctx.save();

    // 5. Move o mundo inteiro para a esquerda com base no Scroll
    ctx.translate(-cameraX, 0);

    // --- DESENHAR O JOGO (Afetado pela câmera) ---

    backgroundItems.forEach((item) => {
      drawBackgroundItem(item);
    });

    // Desenhar Plataformas
    platforms.forEach((plat) => {
      drawPlatformSprite(plat);
    });

    enemies.forEach((enemy) => {
      drawEnemySprite(enemy);
    });

    // Desenhar Jogadores
    for (let id in players) {
      const p = players[id];
      drawPlayerSprite(p);

      // user border
      if (id === myId) {
        ctx.strokeStyle = 'transparent';
        ctx.lineWidth = 2;
        ctx.strokeRect(p.x, p.y, p.width, p.height);
      }
    }

    // 5. Restaura o Canvas para a posição normal
    ctx.restore();

    // --- DESENHAR HUD / UI (Fixo na tela) ---
      ctx.fillStyle = '#ffffff';
      ctx.font = '14px Arial';
  
      // Posição na tela (0 a 800, 0 a 600)
      ctx.fillText(`Mouse Tela: X: ${mouse.x}, Y: ${mouse.y}`, 10, 20);
  
      // Posição no mundo do jogo (considerando o scroll da câmera)
      const worldMouseX = Math.round(mouse.x + cameraX);
      ctx.fillText(`Mouse Mundo: X: ${worldMouseX}, Y: ${mouse.y}`, 10, 40);
  
      // Posição do Jogador no Mundo
      if (myPlayer) {
        const playerX = Math.round(myPlayer.x);
        const playerY = Math.round(myPlayer.y);
        ctx.fillText(`Player Mundo: X: ${playerX}, Y: ${playerY}`, 10, 60);
      }
  }
</script>
