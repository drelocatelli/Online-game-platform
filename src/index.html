<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo de plataforma da Dessa</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #1a1a2e;
        color: #fff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        flex-direction: column;
      }
      h1 {
        margin-bottom: 10px;
        color: #e94560;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
      }
      canvas {
        background: linear-gradient(180deg, #16213e 0%, #0f3460 100%);
        border: 4px solid #0f3460;
        box-shadow: 0 0 30px rgba(15, 52, 96, 0.6);
        border-radius: 12px;
      }
      .controls-info {
        margin-top: 15px;
        background: rgba(255, 255, 255, 0.05);
        padding: 10px 20px;
        border-radius: 8px;
        color: #ccc;
      }
    </style>
  </head>
  <body>
    <h1>Jogo de plataforma da Dessa</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div class="controls-info">
      <p>Use <strong>W / A / D</strong> ou <strong>Setas</strong> para se mover e pular.</p>
    </div>

    <!-- SDK do Socket.IO servido automaticamente pelo Node.js -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');

      let myId = null;
      let players = {};
      let platforms = [];
      let worldWidth = 800;
      let cameraX = 0;

      // Posição do mouse
      const mouse = { x: 0, y: 0 };

      const CANVAS_WIDTH = 800;
      const CANVAS_HEIGHT = 600;

      // --- GERENCIAMENTO DE INPUTS (TECLADO) ---
      const keys = {
        left: false,
        right: false,
        up: false,
      };

      function sendInputs() {
        socket.emit('playerInput', keys);
      }

      window.addEventListener('keydown', (e) => {
        let changed = false;
        if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') {
          if (!keys.left) {
            keys.left = true;
            changed = true;
          }
        }
        if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') {
          if (!keys.right) {
            keys.right = true;
            changed = true;
          }
        }
        if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp' || e.key === ' ') {
          if (!keys.up) {
            keys.up = true;
            changed = true;
          }
        }

        if (changed) sendInputs();
      });

      window.addEventListener('keyup', (e) => {
        let changed = false;
        if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') {
          keys.left = false;
          changed = true;
        }
        if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') {
          keys.right = false;
          changed = true;
        }
        if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp' || e.key === ' ') {
          keys.up = false;
          changed = true;
        }

        if (changed) sendInputs();
      });

      // --- RASTREAMENTO DO MOUSE ---
      canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        // Posição do mouse relativa ao Canvas (Tela)
        mouse.x = Math.round(e.clientX - rect.left);
        mouse.y = Math.round(e.clientY - rect.top);
      });

      // --- EVENTOS SOCKET.IO ---

      socket.on('init', (data) => {
        myId = data.id;
        platforms = data.platforms;
        worldWidth = data.worldWidth;
      });

      socket.on('state', (serverPlayers) => {
        players = serverPlayers;
        render();
      });

      socket.on('levelChanged', (data) => {
        platforms = data.platforms;
        worldWidth = data.worldWidth;
      });

      // --- RENDERIZAÇÃO E CÂMERA ---
      function render() {
        // 1. Limpa a tela
        ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        // 2. Calcula a posição da Câmera
        const myPlayer = players[myId];
        if (myPlayer) {
          cameraX = myPlayer.x - CANVAS_WIDTH / 2 + myPlayer.width / 2;
          cameraX = Math.max(0, Math.min(cameraX, worldWidth - CANVAS_WIDTH));
        }

        // 3. Salva o estado original do Canvas
        ctx.save();

        // 4. Move o mundo inteiro para a esquerda com base no Scroll
        ctx.translate(-cameraX, 0);

        // --- DESENHAR O JOGO (Afetado pela câmera) ---

        // Desenhar Plataformas
        platforms.forEach((plat) => {
          ctx.fillStyle = plat.color;
          ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
        });

        // Desenhar Jogadores
        for (let id in players) {
          const p = players[id];
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x, p.y, p.width, p.height);

          if (id === myId) {
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.strokeRect(p.x, p.y, p.width, p.height);
          }
        }

        // 5. Restaura o Canvas para a posição normal
        ctx.restore();

        // --- DESENHAR HUD / UI (Fixo na tela) ---
        ctx.fillStyle = '#ffffff';
        ctx.font = '14px Arial';

        // Posição na tela (0 a 800, 0 a 600)
        ctx.fillText(`Mouse Tela: X: ${mouse.x}, Y: ${mouse.y}`, 10, 20);

        // Posição no mundo do jogo (considerando o scroll da câmera)
        const worldMouseX = Math.round(mouse.x + cameraX);
        ctx.fillText(`Mouse Mundo: X: ${worldMouseX}, Y: ${mouse.y}`, 10, 40);
      }
    </script>
  </body>
</html>
