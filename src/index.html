<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo de plataforma da Dessa</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: radial-gradient(circle at top, rgba(125, 211, 252, 0.85), transparent 30%),
          linear-gradient(180deg, #16213e 0%, #0f3460 55%, #09111f 100%);
        background-attachment: fixed;
        background-size: cover;
        color: #fff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        flex-direction: column;
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.18), transparent 18%),
          radial-gradient(circle at 80% 10%, rgba(255, 255, 255, 0.12), transparent 15%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 50%);
        z-index: -1;
      }

      #bg {
        background: url('/sprites/backgrounds/profile.png') repeat;
        position: fixed;
        top: 0;
        left: 0;
        z-index: -2;
        width: 100%;
        height: 100%;
        opacity: 0.1;
      }

      .controls-info {
        margin-top: 15px;
        background: rgba(255, 255, 255, 0.05);
        padding: 10px 20px;
        border-radius: 8px;
        color: #ccc;
      }

      #platform-game {
        width: 810px;
        height: 610px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="bg"></div>
    <h1>Jogo de plataforma da Dessa</h1>
    <iframe src="/game" id="platform-game" frameborder="0"></iframe>
    <div class="controls-info">
      <p>Use <strong>W / A / D</strong> ou <strong>Setas</strong> para se mover e pular.</p>
    </div>
  </body>

<script>
  const iframe = document.getElementById('platform-game');

  // Teclas que o jogo usa e que NÃO devem rolar a página
  const teclasDoJogo = [
    'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight',
    'KeyW', 'KeyS', 'KeyA', 'KeyD',
    ' ', 'Spacebar'
  ];

  function travarRolagemDoTeclado(e) {
    if (teclasDoJogo.includes(e.code) || teclasDoJogo.includes(e.key)) {
      e.preventDefault(); // Impede a rolagem padrão da tecla
    }
  }

  // 1. Bloqueia quando o foco está na PÁGINA PRINCIPAL
  window.addEventListener('keydown', travarRolagemDoTeclado, { passive: false });

  // 2. Bloqueia quando o foco está DENTRO DO IFRAME
  iframe.onload = () => {
    try {
      const docIframe = iframe.contentWindow.document;
      
      // Aplica a trava diretamente dentro do iframe do jogo
      docIframe.addEventListener('keydown', travarRolagemDoTeclado, { passive: false });
      
      // Dá o foco para o iframe
      iframe.contentWindow.focus();
    } catch (err) {
      console.error('Erro ao acessar iframe:', err);
    }
  };
</script>
</html>
